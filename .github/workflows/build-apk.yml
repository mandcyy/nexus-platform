name: APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-java@v4
      with: { java-version: '17', distribution: 'temurin' }
    - run: cd android && curl -L -o gradle.zip https://services.gradle.org/distributions/gradle-8.5-bin.zip && unzip -q gradle.zip && gradle-8.5/bin/gradle assembleDebug --no-daemon
    - uses: actions/upload-artifact@v4
      with: { name: APK, path: android/app/build/outputs/apk/**/*.apk }
