groups:
  - name: critical
    rules:
      - alert: HighErrorRate
        expr: rate(http_requests_total{status=~"5.."}[5m]) > 0.05
        for: 2m
        labels: { severity: critical }
        annotations: { summary: "High 5xx error rate detected" }

      - alert: ServiceDown
        expr: up == 0
        for: 1m
        labels: { severity: critical }
        annotations: { summary: "Service {{ $labels.job }} is down" }

      - alert: HighLatency
        expr: histogram_quantile(0.99, rate(http_request_duration_seconds_bucket[5m])) > 1
        for: 5m
        labels: { severity: warning }
        annotations: { summary: "p99 latency > 1s" }

      - alert: DatabaseConnectionPool
        expr: postgresql_backends_active > postgresql_backends_max * 0.8
        for: 5m
        labels: { severity: warning }
        annotations: { summary: "DB connection pool > 80%" }

      - alert: KafkaLag
        expr: kafka_consumer_lag > 10000
        for: 10m
        labels: { severity: warning }
        annotations: { summary: "Kafka consumer lag > 10K messages" }