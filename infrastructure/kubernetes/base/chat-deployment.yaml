apiVersion: apps/v1
kind: Deployment
metadata:
  name: chat-service
  namespace: nexus-platform
spec:
  replicas: 3
  selector:
    matchLabels: { app: chat-service }
  template:
    metadata:
      labels: { app: chat-service }
    spec:
      containers:
      - name: chat-service
        image: nexus-platform/chat-service:latest
        ports: [{ containerPort: 3001 }]
        envFrom:
        - configMapRef: { name: nexus-config }
        - secretRef: { name: nexus-secrets }
        resources:
          requests: { cpu: "250m", memory: "256Mi" }
          limits: { cpu: "1", memory: "1Gi" }
---
apiVersion: v1
kind: Service
metadata:
  name: chat-service
  namespace: nexus-platform
spec:
  selector: { app: chat-service }
  ports: [{ port: 3001, targetPort: 3001 }]