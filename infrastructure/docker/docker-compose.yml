version: "3.9"
services:
  # ─── PostgreSQL Cluster ───
  postgres-primary:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: nexus_admin
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: nexus
    volumes:
      - pg_primary:/var/lib/postgresql/data
    ports: ["5432:5432"]
    command: >
      postgres -c max_connections=1000 -c shared_buffers=2GB
      -c effective_cache_size=6GB -c wal_level=replica
      -c max_wal_senders=5 -c wal_keep_size=1GB
    networks: [nexus-net]

  postgres-replica:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: nexus_replica
      POSTGRES_PASSWORD: ${DB_REPLICA_PASSWORD}
    volumes: [pg_replica:/var/lib/postgresql/data]
    depends_on: [postgres-primary]
    networks: [nexus-net]

  # ─── Redis Cluster ───
  redis-node1:
    image: redis:7-alpine
    command: redis-server --port 6379 --cluster-enabled yes --cluster-config-file nodes.conf
    ports: ["6379:6379"]
    volumes: [redis1:/data]
    networks: [nexus-net]

  redis-node2:
    image: redis:7-alpine
    command: redis-server --port 6380 --cluster-enabled yes
    ports: ["6380:6380"]
    volumes: [redis2:/data]
    networks: [nexus-net]

  redis-node3:
    image: redis:7-alpine
    command: redis-server --port 6381 --cluster-enabled yes
    ports: ["6381:6381"]
    volumes: [redis3:/data]
    networks: [nexus-net]

  # ─── Kafka + ZooKeeper ───
  zookeeper:
    image: confluentinc/cp-zookeeper:latest
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks: [nexus-net]

  kafka:
    image: confluentinc/cp-kafka:latest
    depends_on: [zookeeper]
    ports: ["9092:9092"]
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    networks: [nexus-net]

  # ─── Elasticsearch ───
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0
    environment:
      - discovery.type=single-node
      - ES_JAVA_OPTS=-Xms2g -Xmx2g
      - xpack.security.enabled=false
    ports: ["9200:9200"]
    volumes: [es_data:/usr/share/elasticsearch/data]
    networks: [nexus-net]

  # ─── MinIO (S3-compatible storage) ───
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: nexus_minio
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD}
    ports: ["9000:9000", "9001:9001"]
    volumes: [minio_data:/data]
    networks: [nexus-net]

  # ─── Services ───
  auth-service:
    build: ../../backend/services/auth-service
    ports: ["3000:3000"]
    environment:
      DATABASE_URL: postgresql://nexus_admin:${DB_PASSWORD}@postgres-primary:5432/nexus
      REDIS_HOST: redis-node1
      KAFKA_BROKERS: kafka:29092
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
    depends_on: [postgres-primary, redis-node1, kafka]
    deploy:
      replicas: 3
      resources:
        limits: { cpus: "2", memory: 2G }
    networks: [nexus-net]

  chat-service:
    build: ../../backend/services/chat-service
    ports: ["3001:3001"]
    environment:
      DATABASE_URL: postgresql://nexus_admin:${DB_PASSWORD}@postgres-primary:5432/nexus
      REDIS_HOST: redis-node1
      KAFKA_BROKERS: kafka:29092
      JWT_SECRET: ${JWT_SECRET}
    depends_on: [postgres-primary, redis-node1, kafka]
    deploy:
      replicas: 3
      resources:
        limits: { cpus: "1", memory: 1G }
    networks: [nexus-net]

  # ─── Nginx API Gateway ───
  nginx:
    image: nginx:alpine
    ports: ["80:80", "443:443"]
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on: [auth-service, chat-service]
    networks: [nexus-net]

  # ─── Monitoring ───
  prometheus:
    image: prom/prometheus:latest
    ports: ["9090:9090"]
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    networks: [nexus-net]

  grafana:
    image: grafana/grafana:latest
    ports: ["3030:3000"]
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD}
    volumes: [grafana_data:/var/lib/grafana]
    networks: [nexus-net]

volumes:
  pg_primary: pg_replica: redis1: redis2: redis3:
  es_data: minio_data: prometheus_data: grafana_data:

networks:
  nexus-net:
    driver: bridge