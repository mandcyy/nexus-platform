worker_processes auto;
events { worker_connections 65535; multi_accept on; use epoll; }

http {
    upstream auth_cluster { least_conn; server auth-service:3000; }
    upstream chat_cluster { least_conn; server chat-service:3001; }
    upstream ws_cluster { ip_hash; server chat-service:3001; }

    # Rate limiting zones
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/m;
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    # WAF-like protection
    map $http_user_agent $bad_bot { default 0; "~*bot|crawl|scrap|spider" 1; }

    server {
        listen 80;
        server_name api.nexus-platform.com;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl http2;
        server_name api.nexus-platform.com;

        ssl_certificate /etc/nginx/ssl/nexus.crt;
        ssl_certificate_key /etc/nginx/ssl/nexus.key;
        ssl_protocols TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        # Security headers
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Strict-Transport-Security "max-age=63072000" always;

        client_max_body_size 500M;
        client_body_buffer_size 128k;
        proxy_buffers 16 64k;
        proxy_buffer_size 128k;

        # Auth endpoints
        location /auth/ {
            if ($bad_bot) { return 403; }
            limit_req zone=auth_limit burst=3 nodelay;
            proxy_pass http://auth_cluster;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # API endpoints
        location /api/ {
            if ($bad_bot) { return 403; }
            limit_req zone=api_limit burst=20 nodelay;
            limit_conn conn_limit 100;
            proxy_pass http://auth_cluster;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # WebSocket
        location /ws/ {
            proxy_pass http://ws_cluster;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 86400;
            proxy_send_timeout 86400;
        }

        # Health check
        location /health {
            access_log off;
            return 200 "OK\n";
        }
    }
}