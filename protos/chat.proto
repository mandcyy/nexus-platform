syntax = "proto3";
package nexus.chat;

service ChatService {
  rpc SendMessage (SendMessageRequest) returns (MessageResponse);
  rpc GetMessages (GetMessagesRequest) returns (stream MessageResponse);
}

message SendMessageRequest {
  string chat_id = 1; string sender_id = 2;
  string content_type = 3; string content_json = 4;
  string reply_to = 5;
}
message GetMessagesRequest { string chat_id = 1; int32 limit = 2; string before = 3; }
message MessageResponse {
  string id = 1; string chat_id = 2; string sender_id = 3;
  string content_json = 4; string status = 5;
  int64 created_at = 6;
}